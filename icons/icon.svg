<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d1d28"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6fe0d6"/>
      <stop offset="1" stop-color="#3ba99f"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="232" r="150" fill="none" stroke="#4ecdc4" stroke-width="10" opacity="0.55"/>

  <!-- Medical cross -->
  <g>
    <rect x="216" y="126" width="80" height="212" rx="14" fill="url(#cross)"/>
    <rect x="150" y="192" width="212" height="80" rx="14" fill="url(#cross)"/>
  </g>

  <!-- Heartbeat line -->
  <g stroke="#4ecdc4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
    <path d="M64 408 L176 408 L200 368 L232 448 L264 352 L296 420 L328 408 L448 408"/>
  </g>

  <text x="256" y="478" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="800" fill="#4ecdc4" text-anchor="middle" letter-spacing="4">DOCTOR</text>
</svg>
